<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1f1715">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="秘法富翁棋">
  <meta name="description" content="一款奇幻酒馆卡牌风的大富翁式网页小游戏。">
  <meta property="og:title" content="秘法富翁棋">
  <meta property="og:description" content="掷骰、买地、升级、收租，来一局奇幻酒馆里的富翁棋。">
  <title>秘法富翁棋</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #1f1715;
      font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      touch-action: none;
      overscroll-behavior: none;
    }

    body {
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" aria-label="秘法富翁棋"></canvas>
  <script src="./game.js"></script>
</body>
</html>
